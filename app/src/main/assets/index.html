<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    <title>Mehar Pro Workspace</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg-body: #f4f7f6; --text-main: #1e293b; --accent-primary: #10b981; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg-body); color: var(--text-main); text-align: center; padding-top: 50px; }
        h1 { color: var(--text-main); font-weight: 800; font-size: 32px; margin-bottom: 5px; }
        .sub { color: var(--accent-primary); font-weight: 800; letter-spacing: 2px; text-transform: uppercase; font-size: 14px; }
        .box { background: white; margin: 30px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .status { color: #10b981; font-weight: bold; font-size: 18px; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Mehar Pro.</h1>
    <div class="sub">Local Workspace</div>
    <div class="box">
        <h2>✅ Android Setup Complete!</h2>
        <p>آپ کی ایپ کا بنیادی سٹرکچر 100% کلاؤڈ پر بن چکا ہے۔</p>
        <p>GitHub Actions پر جا کر اپنی <b>.apk</b> فائل ڈاؤنلوڈ کریں۔</p>
        <div class="status">System Ready</div>
    </div>
</body>
</html>
